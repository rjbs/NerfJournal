<link rel="icon" type="image/png" href="{{ '/assets/images/favicon.png' | relative_url }}">
<meta property="og:image" content="{{ '/assets/images/icon.png' | absolute_url }}">
<script>
  // Follow system light/dark preference
  function applySystemTheme() {
    var scheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    jtd.setTheme(scheme);
  }
  document.addEventListener('DOMContentLoaded', applySystemTheme);
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', applySystemTheme);
</script>
